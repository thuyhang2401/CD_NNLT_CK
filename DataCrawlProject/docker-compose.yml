version: "3.8"

services:
  mysql_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: abc123
      MYSQL_DATABASE: glasses_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql_db/init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crawling

  crawl:
    build:
      context: .
      dockerfile: crawl_data/Dockerfile
    environment:
      DATA_FILE_PATH: /app/data_crawl/data.json
    ports:
      - "9001:8001"
    volumes:
      - ./data_crawl:/app/data_crawl
    networks:
      - crawling

  api:
    build:
      context: .
      dockerfile: mysql_api/Dockerfile
    depends_on:
      - mysql_db
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: abc123
      MYSQL_HOST: mysql_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: glasses_db
    ports:
      - "9000:8000"
    networks:
      - crawling

  ui:
    build:
      context: ./app_main
      dockerfile: Dockerfile
    ports:
      - "9080:8080"
    networks:
      - crawling

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    depends_on:
      - api
    environment:
      API_HOST: api
      API_PORT: 8000
      DATA_FILE_PATH: /app/data_crawl/data.json
    ports:
      - "9002:8002"
    volumes:
      - ./data_crawl:/app/data_crawl
    networks:
      - crawling

volumes:
  mysql_data:

networks:
  crawling:
